<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Budget Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="background-animation"></div>

    <div class="container">
        <header>
            <h1>Budget Tracker</h1>
            <p>Your finances, beautifully managed.</p>
        </header>

        <div id="alert-message" class="alert hidden">
            <strong>Warning!</strong> You have spent more than 80% of your total income.
        </div>

        <div class="dashboard">
            <!-- Left Column: Income & Summary -->
            <div class="col glass-panel" id="summary-section">
                <h2>Financial Summary</h2>

                <div class="income-setup">
                    <label for="income-input">Update Monthly Income</label>
                    <div class="input-group">
                        <input type="number" id="income-input" placeholder="0.00" step="0.01">
                        <button id="update-income-btn" class="btn-primary">Set</button>
                    </div>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>Total Income</h3>
                        <p id="total-income" class="amount positive">0.00</p>
                    </div>
                    <div class="stat-card">
                        <h3>Total Expenses</h3>
                        <p id="total-expenses" class="amount negative">0.00</p>
                    </div>
                    <div class="stat-card highlight">
                        <h3>Remaining Balance</h3>
                        <p id="remaining-balance" class="amount">0.00</p>
                    </div>
                </div>
            </div>

            <!-- Right Column: Add Expense & History -->
            <div class="col glass-panel" id="expense-section">
                <h2>Add Daily Expense</h2>

                <form id="expense-form" class="expense-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="expense-date">Date</label>
                            <input type="date" id="expense-date" required>
                        </div>
                        <div class="form-group">
                            <label for="expense-amount">Amount</label>
                            <div class="input-wrapper">
                                <input type="number" id="expense-amount" placeholder="0.00" step="0.01" required>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="expense-category">Category</label>
                        <select id="expense-category" required>
                            <option value="" disabled selected>Select a category</option>
                            <option value="Food">Food</option>
                            <option value="Rent">Rent</option>
                            <option value="Transport">Transport</option>
                            <option value="Grocery">Grocery</option>
                            <option value="EMI">EMI</option>
                            <option value="Entertainment">Entertainment</option>
                            <option value="Utilities">Utilities</option>
                            <option value="Healthcare">Healthcare</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="expense-notes">Notes (Optional)</label>
                        <input type="text" id="expense-notes" placeholder="e.g., Weekly groceries">
                    </div>

                    <button type="submit" class="btn-primary w-100">Add Expense</button>
                </form>
            </div>
        </div>

        <div class="glass-panel mt-2" id="history-section">
            <h2>Recent Expenses</h2>
            <div class="table-container">
                <table id="expense-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Category</th>
                            <th>Notes</th>
                            <th>Amount</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="expense-list">
                        <!-- Expenses will be populated here by JavaScript -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
